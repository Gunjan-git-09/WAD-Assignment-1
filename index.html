<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - Subject Entry</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">


<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
      <a class="navbar-brand" href="#">Admin Panel</a>
      <div class="navbar-nav">
          <a class="nav-link active" href="index.html">Entry</a>
          <a class="nav-link" href="directory.html">Directory</a>
          <a class="nav-link" href="details.html">Statistics</a>
          <a class="nav-link" href="reports.html">Reports</a>
      </div>
  </div>
</nav>


<div class="container">
  <div class="row justify-content-center">
      <div class="col-md-8">
          <div class="card shadow-sm">
              <div class="card-header bg-primary text-white">
                  <h4 class="mb-0">New Subject Entry</h4>
              </div>
              <div class="card-body">
                  <form>
                      <div class="mb-3">
                          <label class="form-label">Subject Title</label>
                          <input type="text" class="form-control" placeholder="Enter name">
                      </div>
                      <div class="mb-3">
                          <label class="form-label">General Information</label>
                          <textarea class="form-control" rows="4" placeholder="Enter details"></textarea>
                      </div>
                      <button type="submit" class="btn btn-primary">Save Data</button>
                      <a href="directory.html" class="btn btn-link">Go to Directory →</a>
                  </form>
              </div>
          </div>
      </div>
  </div>
</div>


</body>
</html>
